x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

x-common-env: &common-env
  # Global
  AURORA_ENV: ${AURORA_ENV}

  # Database - unified credentials
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  DB_POOL_MIN: ${DB_POOL_MIN:-2}
  DB_POOL_MAX: ${DB_POOL_MAX:-20}

  # Redis
  REDIS_URL: ${REDIS_URL}

  # Object Storage (S3-compatible - SeaweedFS by default)
  STORAGE_BUCKET: ${STORAGE_BUCKET}
  STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL}
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
  STORAGE_REGION: ${STORAGE_REGION}
  STORAGE_USE_SSL: ${STORAGE_USE_SSL}
  STORAGE_VERIFY_SSL: ${STORAGE_VERIFY_SSL}
  STORAGE_CACHE_ENABLED: ${STORAGE_CACHE_ENABLED}
  STORAGE_CACHE_TTL: ${STORAGE_CACHE_TTL}

  # Terraform
  TF_CLI_CONFIG_FILE: /etc/terraform.rc

  # Weaviate
  WEAVIATE_HOST: ${WEAVIATE_HOST}
  WEAVIATE_PORT: ${WEAVIATE_PORT}
  WEAVIATE_GRPC_PORT: ${WEAVIATE_GRPC_PORT}

  # SSL/TLS for external services
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
  POSTGRES_SSLROOTCERT: ${POSTGRES_SSLROOTCERT:-}
  REDIS_SSL_CA_CERTS: ${REDIS_SSL_CA_CERTS:-}
  REDIS_SSL_CERT_REQS: ${REDIS_SSL_CERT_REQS:-}
  WEAVIATE_SECURE: ${WEAVIATE_SECURE:-false}
  SPLUNK_SSL_VERIFY: ${SPLUNK_SSL_VERIFY:-false}

  # AWS base credentials for role assumption
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}

  # LLM & AI Services (needed for background chats)
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
  LLM_PROVIDER_MODE: ${LLM_PROVIDER_MODE}
  SEARXNG_URL: ${SEARXNG_URL}
  RCA_OPTIMIZE_COSTS: ${RCA_OPTIMIZE_COSTS}
  ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-true}
  RCA_MODEL: ${RCA_MODEL}
  MAIN_MODEL: ${MAIN_MODEL}
  RCA_ORCHESTRATOR_MODEL: ${RCA_ORCHESTRATOR_MODEL}
  RCA_SUBAGENT_MODEL: ${RCA_SUBAGENT_MODEL}
  VISION_MODEL: ${VISION_MODEL}
  SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
  AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT}
  GEMINI_DISABLE_THINKING: ${GEMINI_DISABLE_THINKING}

  # GitHub auth — every Aurora service that talks to GitHub (server,
  # celery_worker, chatbot) needs the auth mode + App credentials to mint
  # installation tokens. OAuth client credentials are also shared so the
  # MCP server and background workers can mint/read user tokens. Webhook
  # secret stays server-only (lives on the aurora-server entry below).
  GITHUB_AUTH_MODE: ${GITHUB_AUTH_MODE:-app}
  GITHUB_APP_ID: ${GITHUB_APP_ID}
  GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID}
  NEXT_PUBLIC_GITHUB_APP_SLUG: ${NEXT_PUBLIC_GITHUB_APP_SLUG}
  GITHUB_APP_WEBHOOK_URL: ${GITHUB_APP_WEBHOOK_URL}
  GITHUB_APP_SETUP_URL: ${GITHUB_APP_SETUP_URL}
  GH_OAUTH_CLIENT_ID: ${GH_OAUTH_CLIENT_ID}
  GH_OAUTH_CLIENT_SECRET: ${GH_OAUTH_CLIENT_SECRET}

  # AI Safety Guardrails
  GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-true}
  GUARDRAILS_SIGMA_ENABLED: ${GUARDRAILS_SIGMA_ENABLED:-true}
  GUARDRAILS_LLM_MODEL: ${GUARDRAILS_LLM_MODEL:-}

  # Vertex AI (Google Cloud)
  VERTEX_AI_PROJECT: ${VERTEX_AI_PROJECT}
  VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION}
  VERTEX_AI_SERVICE_ACCOUNT_JSON: ${VERTEX_AI_SERVICE_ACCOUNT_JSON}

  # Ollama (local LLM inference)
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

  # Pod Isolation
  ENABLE_POD_ISOLATION: ${ENABLE_POD_ISOLATION}


  # Feature Flags (single NEXT_PUBLIC_ENABLE_* vars for both backend and frontend)
  NEXT_PUBLIC_ENABLE_OVH: ${NEXT_PUBLIC_ENABLE_OVH}
  NEXT_PUBLIC_ENABLE_PAGERDUTY_OAUTH: ${NEXT_PUBLIC_ENABLE_PAGERDUTY_OAUTH}
  NEXT_PUBLIC_ENABLE_JIRA: ${NEXT_PUBLIC_ENABLE_JIRA}
  NEXT_PUBLIC_ENABLE_SHAREPOINT: ${NEXT_PUBLIC_ENABLE_SHAREPOINT}
  NEXT_PUBLIC_ENABLE_NOTION: ${NEXT_PUBLIC_ENABLE_NOTION}
  NEXT_PUBLIC_ENABLE_SPINNAKER: ${NEXT_PUBLIC_ENABLE_SPINNAKER}
  # Slack OAuth (needed by celery_worker for formatting responses)
  SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
  SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
  SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}

  # Atlassian OAuth (Confluence + Jira)
  ATLASSIAN_CLIENT_ID: ${ATLASSIAN_CLIENT_ID}
  ATLASSIAN_CLIENT_SECRET: ${ATLASSIAN_CLIENT_SECRET}

  # SharePoint OAuth
  SHAREPOINT_CLIENT_ID: ${SHAREPOINT_CLIENT_ID}
  SHAREPOINT_CLIENT_SECRET: ${SHAREPOINT_CLIENT_SECRET}
  SHAREPOINT_TENANT_ID: ${SHAREPOINT_TENANT_ID}

  # Notion OAuth (optional — IIT works without these)
  NOTION_CLIENT_ID: ${NOTION_CLIENT_ID}
  NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET}
  NOTION_REDIRECT_URI: ${NOTION_REDIRECT_URI}

  # OVH OAuth2
  OVH_EU_CLIENT_ID: ${OVH_EU_CLIENT_ID}
  OVH_EU_CLIENT_SECRET: ${OVH_EU_CLIENT_SECRET}
  OVH_CA_CLIENT_ID: ${OVH_CA_CLIENT_ID}
  OVH_CA_CLIENT_SECRET: ${OVH_CA_CLIENT_SECRET}
  OVH_US_CLIENT_ID: ${OVH_US_CLIENT_ID}
  OVH_US_CLIENT_SECRET: ${OVH_US_CLIENT_SECRET}

  # Security
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}

  # URLs
  NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
  BACKEND_URL: ${BACKEND_URL}

  # Secrets Backend
  SECRETS_BACKEND: ${SECRETS_BACKEND:-vault}
  VAULT_ADDR: ${VAULT_ADDR}
  VAULT_TOKEN: ${VAULT_TOKEN}
  VAULT_KV_MOUNT: ${VAULT_KV_MOUNT}
  VAULT_KV_BASE_PATH: ${VAULT_KV_BASE_PATH}
  AWS_SM_REGION: ${AWS_SM_REGION:-}
  AWS_SM_PREFIX: ${AWS_SM_PREFIX:-aurora/users}
  AWS_SM_ACCESS_KEY_ID: ${AWS_SM_ACCESS_KEY_ID:-}
  AWS_SM_SECRET_ACCESS_KEY: ${AWS_SM_SECRET_ACCESS_KEY:-}

  # Memgraph (Graph Database)
  MEMGRAPH_HOST: ${MEMGRAPH_HOST}
  MEMGRAPH_PORT: ${MEMGRAPH_PORT}
  MEMGRAPH_SCHEME: ${MEMGRAPH_SCHEME:-bolt}
  MEMGRAPH_USER: ${MEMGRAPH_USER:-}
  MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD:-}
  DISCOVERY_INTERVAL_HOURS: ${DISCOVERY_INTERVAL_HOURS}

  # Email Notifications (SMTP)
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME}
  FRONTEND_URL: ${FRONTEND_URL}


services:
  aurora-server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    image: aurora_server:latest
    container_name: aurora-server
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FLASK_PORT:-5080}:${FLASK_PORT:-5080}"
    volumes:
      - ./server:/app
      - terraform-workdir:/app/terraform_workdir
    command: ["sh", "-c", "gunicorn main_compute:app --bind 0.0.0.0:${FLASK_PORT:-5080} -k gthread --threads ${GUNICORN_THREADS:-4} --workers ${GUNICORN_WORKERS:-2} --timeout 300 --reload"]
    environment:
      <<: *common-env
      FLASK_PORT: ${FLASK_PORT:-5080}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}

      # Frontend/Backend URLs
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NGROK_URL: ${NGROK_URL}

      # GCP Auth
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}

      # Slack OAuth
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}

      # Google Chat (OAuth for setup, service account for messaging)
      GOOGLE_CHAT_CLIENT_ID: ${GOOGLE_CHAT_CLIENT_ID}
      GOOGLE_CHAT_CLIENT_SECRET: ${GOOGLE_CHAT_CLIENT_SECRET}
      GOOGLE_CHAT_SERVICE_ACCOUNT_KEY: ${GOOGLE_CHAT_SERVICE_ACCOUNT_KEY}

      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}

      # Cloud Provider Cache Settings (applies to all providers)
      AURORA_SETUP_CACHE_ENABLED: ${AURORA_SETUP_CACHE_ENABLED}
      AURORA_SETUP_CACHE_TTL: ${AURORA_SETUP_CACHE_TTL}
      AURORA_VERIFY_CLI_IDENTITY: ${AURORA_VERIFY_CLI_IDENTITY}
      AURORA_CACHE_TOKEN_IN_REDIS: ${AURORA_CACHE_TOKEN_IN_REDIS}

      # GitHub App webhook secret — server-only (HMAC validation lives in
      # the route handler; chatbot/celery_worker handle already-verified
      # deliveries). Other GitHub vars come from x-common-env.
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}

      # Bitbucket OAuth
      BB_OAUTH_CLIENT_ID: ${BB_OAUTH_CLIENT_ID}
      BB_OAUTH_CLIENT_SECRET: ${BB_OAUTH_CLIENT_SECRET}

      # PagerDuty OAuth
      PAGERDUTY_CLIENT_ID: ${PAGERDUTY_CLIENT_ID}
      PAGERDUTY_CLIENT_SECRET: ${PAGERDUTY_CLIENT_SECRET}

      # Backend Secrets
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}

      # Security & Rate Limiting
      RATE_LIMITING_ENABLED: ${RATE_LIMITING_ENABLED}
      RATE_LIMIT_BYPASS_TOKEN: ${RATE_LIMIT_BYPASS_TOKEN}
      RATE_LIMIT_HEADERS_ENABLED: ${RATE_LIMIT_HEADERS_ENABLED}

      # OVH OAuth2
      OVH_CA_CLIENT_ID: ${OVH_CA_CLIENT_ID}
      OVH_CA_CLIENT_SECRET: ${OVH_CA_CLIENT_SECRET}
      OVH_EU_CLIENT_ID: ${OVH_EU_CLIENT_ID}
      OVH_EU_CLIENT_SECRET: ${OVH_EU_CLIENT_SECRET}
      OVH_US_CLIENT_ID: ${OVH_US_CLIENT_ID}
      OVH_US_CLIENT_SECRET: ${OVH_US_CLIENT_SECRET}
    depends_on:
      - postgres
      - weaviate
      - redis
      - vault
      - seaweedfs-filer
      - memgraph
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${FLASK_PORT:-5080}/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    image: aurora_celery-worker:latest
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server:/app
      - terraform-workdir:/app/terraform_workdir
    command: >
      celery -A celery_config worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-4}
    environment:
      <<: *common-env
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      CHATBOT_INTERNAL_URL: ${CHATBOT_INTERNAL_URL}

      # Frontend/Backend URLs
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}

      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}

      # Cloud Provider Cache Settings (applies to all providers)
      AURORA_SETUP_CACHE_ENABLED: ${AURORA_SETUP_CACHE_ENABLED}
      AURORA_SETUP_CACHE_TTL: ${AURORA_SETUP_CACHE_TTL}
      AURORA_VERIFY_CLI_IDENTITY: ${AURORA_VERIFY_CLI_IDENTITY}
      AURORA_CACHE_TOKEN_IN_REDIS: ${AURORA_CACHE_TOKEN_IN_REDIS}

      # GitHub App — auth mode + App credentials come from x-common-env.
      # Webhook secret intentionally NOT passed to the worker (the route
      # handler validates HMAC; the worker handles already-verified deliveries).

      # Google Chat (service account needed to send responses)
      GOOGLE_CHAT_SERVICE_ACCOUNT_KEY: ${GOOGLE_CHAT_SERVICE_ACCOUNT_KEY}
    depends_on:
      - redis
      - vault
      - seaweedfs-filer
      - memgraph

  celery_beat:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    logging: *default-logging
    volumes:
      - ./server:/app
    environment:
      <<: *common-env

      # Frontend/Backend URLs
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}

    command: >
      celery -A celery_config beat
        --loglevel=info
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    logging: *default-logging
    ports:
      - "6379:6379"
    command: ["redis-server", "--maxmemory", "${REDIS_MAXMEMORY:-256mb}", "--maxmemory-policy", "allkeys-lru"]

  searxng:
    image: searxng/searxng:2025.5.8-7ca24eee4
    container_name: aurora-searxng
    logging: *default-logging
    ports:
      - "8082:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    restart: unless-stopped
    
  vault:
    image: hashicorp/vault:1.15
    container_name: aurora-vault
    logging: *default-logging
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_LOG_LEVEL: info
      SKIP_SETCAP: "true"
    cap_add:
      - IPC_LOCK
    entrypoint: vault
    command: ["server", "-config=/vault/config/vault.hcl"]
    volumes:
      - ./config/vault/vault.hcl:/vault/config/vault.hcl:ro
      - vault-data:/vault/data
      - vault-init:/vault/init
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status || [ $$? -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 3

  vault-init:
    image: busybox:1.37.0
    container_name: aurora-vault-init
    logging: *default-logging
    restart: "no"
    volumes:
      - ./scripts/vault-init-persistent.sh:/vault-init.sh:ro
      - vault-init:/vault/init
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT}
    command: ["sh", "/vault-init.sh"]
    depends_on:
      vault:
        condition: service_healthy


  chatbot:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    image: aurora_chatbot:latest
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    command: ["python", "main_chatbot.py"]
    volumes:
      - ./server:/app
      - terraform-workdir:/app/terraform_workdir
    environment:
      <<: *common-env
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}

      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL}
      CHATBOT_INTERNAL_URL: ${CHATBOT_INTERNAL_URL}

      # Caching & Performance

      # Pod & MCP Settings
      CHATBOT_POD_TTL: ${CHATBOT_POD_TTL}
      ENABLE_POD_ISOLATION: ${ENABLE_POD_ISOLATION}
      TERMINAL_NAMESPACE: ${TERMINAL_NAMESPACE}
      TERMINAL_IMAGE: ${TERMINAL_IMAGE}
      TERMINAL_POD_TTL: ${TERMINAL_POD_TTL}
    depends_on:
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    ports:
      - "5006:5006"

  postgres:
    image: postgres:15-alpine
    container_name: aurora-postgres
    logging: *default-logging
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.6
    container_name: weaviate
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      ENABLE_API_BASED_MODULES: "true"
      CLUSTER_HOSTNAME: "node1"
      ENABLE_MODULES: "text2vec-transformers"
      TRANSFORMERS_INFERENCE_API: "http://t2v-transformers:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8080/v1/.well-known/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  aurora-mcp:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    container_name: aurora-mcp
    logging: *default-logging
    ports:
      - "${MCP_PORT:-8811}:8811"
    volumes:
      - ./server:/app
    command: ["python", "mcp_server.py"]
    environment:
      <<: *common-env
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    depends_on:
      aurora-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8811)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  t2v-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-all-MiniLM-L6-v2
    logging: *default-logging
    environment:
      ENABLE_CUDA: '0'

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    image: aurora_frontend:latest
    logging: *default-logging
    environment:
      # Next.js development configuration
      NODE_ENV: development
      FRONTEND_DEV_RUNTIME: ${FRONTEND_DEV_RUNTIME:-bun}
      AURORA_ENV: ${AURORA_ENV}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING_INTERVAL: 1000

      # Public variables (browser-accessible, injected at runtime via docker-entrypoint.sh)
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
      NEXT_PUBLIC_ENABLE_OVH: ${NEXT_PUBLIC_ENABLE_OVH}
      NEXT_PUBLIC_ENABLE_PAGERDUTY_OAUTH: ${NEXT_PUBLIC_ENABLE_PAGERDUTY_OAUTH}
      NEXT_PUBLIC_ENABLE_JIRA: ${NEXT_PUBLIC_ENABLE_JIRA}
      NEXT_PUBLIC_ENABLE_SHAREPOINT: ${NEXT_PUBLIC_ENABLE_SHAREPOINT}
      NEXT_PUBLIC_ENABLE_NOTION: ${NEXT_PUBLIC_ENABLE_NOTION}
      NEXT_PUBLIC_ENABLE_SPINNAKER: ${NEXT_PUBLIC_ENABLE_SPINNAKER}

      # Server-side only (Next.js API routes & middleware)
      PUBLIC_API_URL: ${NEXT_PUBLIC_BACKEND_URL}
      PUBLIC_WS_URL: ${NEXT_PUBLIC_WEBSOCKET_URL}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}

      # Auth.js configuration (required)
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${FRONTEND_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - aurora-server

  # SeaweedFS - S3-compatible Object Storage (Apache 2.0 licensed)
  # ═══════════════════════════════════════════════════════════════════════════

  seaweedfs-master:
    image: chrislusf/seaweedfs:4.07
    container_name: aurora-seaweedfs-master
    logging: *default-logging
    command: >
      master
      -ip=seaweedfs-master
      -ip.bind=0.0.0.0
      -port=9333
      -mdir=/data/master
      -defaultReplication=000
    ports:
      - "9333:9333"
      - "19333:19333"
    volumes:
      - seaweedfs_master_data:/data/master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.07
    container_name: aurora-seaweedfs-volume
    logging: *default-logging
    command: >
      volume
      -mserver=seaweedfs-master:9333
      -ip.bind=0.0.0.0
      -port=8081
      -dir=/data
      -max=100
    ports:
      - "8081:8081"
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.07
    container_name: aurora-seaweedfs-filer
    logging: *default-logging
    command: >
      filer
      -master=seaweedfs-master:9333
      -ip.bind=0.0.0.0
      -port=8888
      -s3
      -s3.port=8333
      -s3.allowEmptyFolder=true
      -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "8888:8888"
      - "8333:8333"
    volumes:
      - seaweedfs_filer_data:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    depends_on:
      seaweedfs-master:
        condition: service_healthy
      seaweedfs-volume:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  seaweedfs-init:
    image: amazon/aws-cli:2.34.6
    container_name: aurora-seaweedfs-init
    logging: *default-logging
    restart: "no"
    entrypoint: /bin/sh
    command: >
      -c "
        echo 'Waiting for SeaweedFS S3 API...'
        sleep 5
        echo 'Creating aurora-storage bucket...'
        aws --endpoint-url http://seaweedfs-filer:8333 s3 mb s3://aurora-storage 2>/dev/null || true
        echo 'SeaweedFS initialization complete!'
      "
    environment:
      AWS_ACCESS_KEY_ID: "admin"
      AWS_SECRET_ACCESS_KEY: "admin"
      AWS_DEFAULT_REGION: "us-east-1"
    depends_on:
      seaweedfs-filer:
        condition: service_healthy

  # Memgraph - In-memory Graph Database
  # ═══════════════════════════════════════════════════════════════════════════

  memgraph:
    image: memgraph/memgraph-mage:3.8.1
    container_name: aurora-memgraph
    logging: *default-logging
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
    command: >
      --memory-limit=512
      --log-level=ERROR
      --also-log-to-stderr
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',7687)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:3.8.0
    container_name: aurora-memgraph-lab
    logging: *default-logging
    ports:
      - "3001:3000"
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    restart: unless-stopped

volumes:
  postgres-data:
  weaviate_data:
  terraform-workdir:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  seaweedfs_filer_data:
  vault-data:
  vault-init:
  memgraph-data:
