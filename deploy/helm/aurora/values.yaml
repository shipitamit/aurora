# ------------------------------------------------------------------------------
# Persistent storage
# ------------------------------------------------------------------------------
persistence:
  postgres:
    size: 50Gi           # Database storage
  weaviate:
    size: 50Gi           # Vector embeddings storage
  vault:
    size: 10Gi           # Secrets storage
  redis:
    size: 5Gi            # Celery task state and cache
  memgraph:
    size: 5Gi            # Graph database snapshots
  minio:
    size: 10Gi           # Object storage (local dev only)

# ------------------------------------------------------------------------------
# Ingress configuration
# ------------------------------------------------------------------------------
# Uses subdomain-based routing (industry standard):
#   aurora.example.com     → Frontend
#   api.aurora.example.com → API Server
#   ws.aurora.example.com  → WebSocket Server
ingress:
  enabled: true
  className: "nginx"   # Your ingress controller class (e.g., nginx, traefik, alb, haproxy)

  # Set to true for private/VPN deployments to provision a VPC-internal load balancer.
  # The ingress will have no public IP — only reachable from within your VPC or over VPN.
  # You must also add your cloud provider's internal LB annotation via ingress.annotations:
  #   GKE:   cloud.google.com/load-balancer-type: "Internal"
  #   EKS:   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  #   AKS:   service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  # This is set automatically when deploying with: ./deploy/k8s-deploy.sh --private
  internal: false
  
  # Custom annotations - merged with controller-specific defaults below
  # Use this to add your own annotations or override defaults
  annotations: {}
  #   kubernetes.io/ingress.global-static-ip-name: "my-ip"
  #   external-dns.alpha.kubernetes.io/hostname: "example.com"
  
  # Controller-specific annotations (auto-applied based on className)
  # ----------------------------------------------------------------
  # These are critical for Aurora's functionality:
  #   - proxy-read-timeout: 3600s - Required for long-running RCA analysis (240 agent iterations can take 30+ minutes)
  #   - proxy-http-version: 1.1 - Required for WebSocket upgrade
  #   - proxy-body-size: 50m - Required for file uploads
  #
  # WARNING: Regardless of which controller you use, you MUST ensure these
  # settings are configured (via annotations, IngressClass params, or controller config):
  #   - Read and send timeout: 3600s - Required for long-running RCA analysis
  #   - HTTP version: 1.1 - Required for WebSocket upgrade
  #   - Max body size: 50m - Required for file uploads
  # Without these, you'll experience WebSocket disconnects, failed upgrades,
  # and 413 errors on file uploads.
  #
  # When className is "nginx", these are auto-applied as annotations.
  # For other controllers, configure equivalent settings via ingress.annotations
  # or your controller's configuration.
  #
  nginx:
    # Auto-apply nginx annotations when className is "nginx"
    enabled: true  # Set to false to disable nginx defaults even when className is nginx
    proxyReadTimeout: "3600"
    proxySendTimeout: "3600"
    proxyBodySize: "50m"
    proxyHttpVersion: "1.1"
    # Cookie-based session affinity for WebSocket connections
    # Ensures the HTTP upgrade request hits the same pod when scaling chatbot replicas
    sessionAffinity:
      enabled: true
      cookieName: "aurora-ws-affinity"
      cookieMaxAge: "3600"
  
  # TLS/HTTPS Configuration
  # ------------------------
  # Option 1: Kubernetes TLS with cert-manager (Recommended for production)
  #   - Automatic Let's Encrypt certificates
  #   - Requires cert-manager installed in cluster
  #   - Set tls.enabled: true and tls.certManager.enabled: true
  #
  # Option 2: Manual TLS certificate
  #   - Create your own kubernetes secret with certificate
  #   - Set tls.enabled: true and provide tls.secretName
  tls:
    enabled: false  # Set to true if using Option 1 or 2
    secretName: "aurora-tls"  # Secret name for manual certificates (Option 2)
    
    # Automatic certificate management with cert-manager (Option 1)
    certManager:
      enabled: false  # Set to true to use cert-manager with Let's Encrypt
      issuer: "letsencrypt-prod"  # ClusterIssuer name (must be created separately)
      email: ""  # Email for Let's Encrypt notifications
  
  hosts:
    frontend: "aurora.example.com"
    api: "api.aurora.example.com"
    ws: "ws.aurora.example.com"

  # Additional Ingress resources (e.g., external ingress for webhooks).
  # Each entry creates a separate Kubernetes Ingress object.
  # IMPORTANT: 'name' is required, must be unique across entries, and must not
  # be 'ingress' (reserved for the primary ingress object).
  # Service names are NOT auto-resolved. Use the full Kubernetes service name.
  # Aurora services follow the pattern: <release-name>-<component>
  # e.g., aurora-oss-server, aurora-oss-frontend, aurora-oss-chatbot
  additional: []
    # - name: external-webhooks
    #   className: "nginx"
    #   annotations: {}
    #   tls: []
    #   rules:
    #     - host: "api-external.example.com"
    #       http:
    #         paths:
    #           - path: /
    #             pathType: Prefix
    #             backend:
    #               service: aurora-oss-server
    #               port: 5080

# ------------------------------------------------------------------------------
# Vault Configuration
# ------------------------------------------------------------------------------
# SECURITY NOTE: Internal Traffic Encryption
# ------------------------------------------
# By default, Vault's TCP listener has TLS disabled (tls_disable = 1), meaning
# all communication between pods and Vault travels as plaintext HTTP inside the
# cluster. This includes Vault tokens and secrets.
#
# MITIGATIONS IN PLACE:
#   1. Terminal pods run in an isolated namespace with a default-deny NetworkPolicy
#      that blocks all egress to cluster-internal IPs (see pod-isolation.yaml).
#      Untrusted pods cannot reach Vault, Weaviate, Postgres, Redis, or any other internal services.
#   2. Terminal pods never receive Vault tokens - credentials are fetched by
#      trusted pods and injected per-command via environment variables.
#
# For additional hardening, consider:
#   - Enable TLS on Vault listener with auto-generated or provided certificates
#   - Use a service mesh (Istio/Linkerd) that provides mTLS between pods
#
# NOTE: NetworkPolicies require a CNI plugin that supports them (Calico, Cilium,
# Weave Net, etc.). If your cluster doesn't support NetworkPolicies, the policy
# will be created but have no effect.
#
# Auto-Unseal Configuration (Optional)
# ------------------------------------
# By default, Vault uses Shamir seals (manual unsealing after pod restarts).
# For production, configure auto-unseal with cloud KMS.
# See docs/KMS_SETUP.md for detailed setup guides.
#
# WARNING: If KMS key is deleted, Vault data is permanently unrecoverable.
vault:
  seal:
    # Options: "shamir" (default), "gcpckms", "awskms"
    type: "shamir"
    
    # GCP Cloud KMS Configuration
    # See docs/KMS_GCP.md for setup instructions
    # gcpckms:
    #   project: "your-project-id"
    #   region: "us-central1"
    #   key_ring: "vault-keyring"
    #   crypto_key: "vault-unseal-key"
    #   # For on-prem: credentials: "/vault/gcp/credentials.json"

    # AWS KMS Configuration
    # See website/docs/deployment/vault-kms-setup.md for setup instructions
    # awskms:
    #   region: "us-east-1"
    #   kms_key_id: "alias/vault-unseal-key"  # Key ID, ARN, or alias
    #   # For EKS with IRSA: leave credentials unset (uses pod identity)
    #   # For non-EKS clusters (on-prem, GKE, AKS, etc.): set credentials: true and create
    #   #   kubectl create secret generic vault-aws-kms \
    #   #     --from-literal=access_key=AKIA... \
    #   #     --from-literal=secret_key=...
    #   # credentials: true
