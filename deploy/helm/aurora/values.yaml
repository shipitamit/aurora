# ==============================================================================
# Aurora Helm Chart - Default Configuration
# ==============================================================================
# This file contains all available configuration options with sensible defaults.
# Copy this file to `values.generated.yaml` and customize for your deployment.
#
# DO NOT commit values.generated.yaml - it contains secrets!
# ==============================================================================

# ------------------------------------------------------------------------------
# Chart metadata (optional overrides)
# ------------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# ------------------------------------------------------------------------------
# Stateful Services - Enable/Disable
# ------------------------------------------------------------------------------
# Set to false to use external managed services (RDS, ElastiCache, etc.)
# When disabled, configure the external host in the config section below

services:
  postgres:
    enabled: true    # Set false to use external Postgres (RDS, Cloud SQL, etc.)
  redis:
    enabled: true    # Set false to use external Redis (ElastiCache, Memorystore, etc.)
  weaviate:
    enabled: true    # Set false to use Weaviate Cloud or external instance
  vault:
    enabled: true    # Set false to use external Vault or other secrets manager
  memgraph:
    enabled: true    # Set false if graph features are not needed
  minio:
    enabled: false   # Set true for local dev (provides S3-compatible storage in-cluster)

# ------------------------------------------------------------------------------
# ServiceAccount configuration
# ------------------------------------------------------------------------------
# Each service gets its own ServiceAccount for proper RBAC
# On-prem: annotations can be left empty
# Cloud: add workload identity annotations as needed (GKE, EKS IRSA, AKS, etc.)
#
# IRSA (EKS) — the annotated role must have ALL of the following permissions:
#   1. S3 access on your storage bucket (if not using static STORAGE_ACCESS_KEY/SECRET_KEY)
#   2. secretsmanager:* on aurora/users/* (if SECRETS_BACKEND=aws_secrets_manager)
#   3. sts:AssumeRole on * (for the AWS connector — needs cross-account access, so resource must be *)
#      Without this, the AWS connector cannot assume cross-account roles and will return
#      "not authorized to perform: sts:AssumeRole" errors.
#
# The IRSA role's trust policy must use StringLike to cover ALL backend SAs:
#   "StringLike": { "<oidc>:sub": "system:serviceaccount:<ns>:<release>-aurora-oss-*" }
# Scoping to only the server SA causes AssumeRoleWithWebIdentity failures in
# the chatbot and celery workers.
#
# Example EKS IRSA annotation:
#   annotations:
#     eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<your-aurora-irsa-role>
serviceAccount:
  # Annotations applied to backend service accounts (server, chatbot, celery)
  annotations: {}
  
  # Vault-specific ServiceAccount annotations (e.g., for cloud KMS auto-unseal)
  vault:
    annotations: {}

# ------------------------------------------------------------------------------
# Container images
# ------------------------------------------------------------------------------
image:
  # Container registry where images are stored
  registry: "your-registry"  #Examples: docker.io/myorg, gcr.io/project-id, ghcr.io/myorg
  
  # Image tag (version) to deploy
  tag: "latest"
  
  # Optional: Pull secrets for private registries
  # pullSecrets:
  #   - name: regcred

# ------------------------------------------------------------------------------
# Frontend image override
# ------------------------------------------------------------------------------
# When set, the frontend deployment uses this image instead of the default
# aurora-frontend from image.registry. Useful for custom frontend builds
# (e.g. with additional analytics or SaaS overlay features).
# Deploy with: helm upgrade --reuse-values --set frontendImage.tag=sha-abc1234
frontendImage: {}
  # registry: "ghcr.io/your-org"
  # repository: "aurora-frontend-custom"
  # tag: "sha-abc1234"
  # pullSecrets:
  #   - name: ghcr-pull

# ------------------------------------------------------------------------------
# Autoscaling (HPA)
# ------------------------------------------------------------------------------
autoscaling:
  server:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
    targetMemory:         # optional — set to e.g. 80 to also scale on memory
  celeryWorker:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

# ------------------------------------------------------------------------------
# Extra environment variables (for marketplace metering, custom integrations, etc.)
# ------------------------------------------------------------------------------
extraEnv: []
# Example:
#   extraEnv:
#     - name: AWS_MP_PRODUCT_CODE
#       value: "prod-abc123"
#     - name: GCP_MP_SERVICE_NAME
#       value: "aurora-marketplace.endpoints.project.cloud.goog"

# ------------------------------------------------------------------------------
# Celery worker pod settings
# ------------------------------------------------------------------------------
celeryWorker:
  # Must exceed run_background_chat's time_limit (1800s) to avoid SIGKILL mid-task
  terminationGracePeriodSeconds: 1860

# ------------------------------------------------------------------------------
# Replica counts per service
# ------------------------------------------------------------------------------
replicaCounts:
  # Scalable services (can increase for load balancing)
  # NOTE: When autoscaling is enabled above, these values are ignored — HPA's minReplicas takes over.
  server: 1          # API server (Flask) - stateless, can scale
  mcp: 1             # MCP server (streamable-http on 8811)
  celeryWorker: 1    # Background task workers - stateless, can scale
  chatbot: 1         # WebSocket chatbot - stateless, can scale (session affinity enabled by default)
  frontend: 1        # Next.js frontend - stateless, can scale
  searxng: 1         # Web search engine - stateless, can scale
  transformers: 1    # ML model service - stateless, can scale
  
  # Single-instance services (do NOT increase without additional config)
  celeryBeat: 1      # Task scheduler - only 1 to avoid duplicate tasks
  redis: 1           # Redis - single instance, no clustering configured
  weaviate: 1        # Vector database - single instance, clustering requires additional config
  memgraph: 1        # Graph database - single instance, in-memory
  vault: 1           # Secrets manager - single instance, HA requires additional config
  postgres: 1        # Database - single instance, replication requires additional config

# ------------------------------------------------------------------------------
# Application configuration (non-sensitive)
# ------------------------------------------------------------------------------
config:
  AURORA_ENV: "production" # Environment: dev, staging, production
  
  # --- Database ---
  POSTGRES_HOST: ""  # Auto-generated if empty: <release>-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "aurora_db"
  
  # --- Redis Cache ---
  REDIS_URL: ""  # Auto-generated if empty: redis://<release>-redis:6379/0
  REDIS_MAXMEMORY: "256mb"  # Max memory for in-cluster Redis; staging/prod can override
  
  # --- S3-Compatible Object Storage (REQUIRED) ---
  # Supports: AWS S3, MinIO, Cloudflare R2, Backblaze B2, etc.
  STORAGE_BUCKET: ""             # REQUIRED - Your bucket name
  STORAGE_ENDPOINT_URL: ""       # REQUIRED - e.g., https://s3.amazonaws.com
  STORAGE_REGION: "us-east-1"    # Your storage region
  STORAGE_USE_SSL: "true"
  STORAGE_VERIFY_SSL: "true"
  STORAGE_CACHE_ENABLED: "true"
  STORAGE_CACHE_TTL: "60"
  
  # --- Vector Database (Weaviate) ---
  WEAVIATE_HOST: ""  # Auto-generated if empty: <release>-weaviate
  WEAVIATE_PORT: "8080"
  WEAVIATE_GRPC_PORT: "50051"
  
  # --- Graph Database (Memgraph) ---
  MEMGRAPH_HOST: ""  # Auto-generated if empty: <release>-memgraph
  MEMGRAPH_PORT: "7687"
  MEMGRAPH_SCHEME: "bolt"  # Use "bolt+ssc" for Memgraph Cloud (SSL, self-signed), "bolt+s" for CA-signed SSL
  MEMGRAPH_MEMORY_LIMIT: "512"  # MB, passed to --memory-limit flag
  
  # --- SSL/TLS for External Services ---
  # PostgreSQL: "prefer" auto-negotiates TLS (works for RDS/Cloud SQL out of box)
  POSTGRES_SSLMODE: "prefer"
  POSTGRES_SSLROOTCERT: ""        # Path to CA cert (mount via ssl.caCertSecret)
  # Redis: use rediss:// in REDIS_URL to enable TLS
  REDIS_SSL_CA_CERTS: ""          # Path to CA cert for Redis TLS
  REDIS_SSL_CERT_REQS: ""         # "none", "optional", "required"
  # Weaviate: set to "true" for HTTPS+gRPC-TLS
  WEAVIATE_SECURE: "false"
  
  # --- Public URLs (REQUIRED) ---
  # NEXT_PUBLIC_* vars are written to window.__ENV by docker-entrypoint.sh at startup.
  # Changing them only requires a pod restart, not an image rebuild.
  NEXT_PUBLIC_BACKEND_URL: ""    # Example: https://api.aurora.example.com
  NEXT_PUBLIC_WEBSOCKET_URL: ""  # Example: wss://ws.aurora.example.com
  FRONTEND_URL: ""               # Example: https://aurora.example.com
  
  # --- Internal Service URLs ---
  BACKEND_URL: ""             # Auto-generated if empty: http://<release>-server:5080
  CHATBOT_INTERNAL_URL: ""    # Auto-generated if empty: http://<release>-chatbot:5007
  VAULT_ADDR: ""              # Default applied by chart when empty: http://<release>-vault:8200
  SEARXNG_URL: ""             # Auto-generated if empty: http://<release>-searxng:8080
  
  # --- Secrets Backend ---
  # "vault" (default) or "aws_secrets_manager"
  SECRETS_BACKEND: "vault"

  # --- Flask/API Configuration ---
  FLASK_PORT: "5080"
  VAULT_KV_MOUNT: "aurora"
  VAULT_KV_BASE_PATH: "users"

  # --- AWS Secrets Manager (only when SECRETS_BACKEND=aws_secrets_manager) ---
  AWS_SM_REGION: ""
  AWS_SM_PREFIX: "aurora/users"
  AWS_SM_ACCESS_KEY_ID: ""      # Dedicated IAM key for Secrets Manager access (avoids collision with AWS connector creds)
  AWS_SM_SECRET_ACCESS_KEY: ""  # Falls back to default boto3 chain if both are empty
  
  # --- LLM Configuration ---
  LLM_PROVIDER_MODE: "openrouter"  #Provider: openrouter, openai, anthropic, google
  AGENT_RECURSION_LIMIT: "240" #Maximum number of steps an agent can take

  # --- AI Safety Guardrails ---
  # Input rail + signature matcher + LLM safety judge. All three activate with
  # the master switch; LLM checks fail closed. Adapted from Meta's PurpleLlama
  # (MIT licensed).
  GUARDRAILS_ENABLED: "true"
  # Gate the vendored SigmaHQ rule corpus inside the signature matcher.
  # Requires GUARDRAILS_ENABLED=true. Set to "false" to run only hand-written rules.
  GUARDRAILS_SIGMA_ENABLED: "true"
  # Safety judge / input rail model (provider/model format). Empty = use MAIN_MODEL.
  GUARDRAILS_LLM_MODEL: ""

  # --- Concurrency & Pool Sizing ---
  GUNICORN_WORKERS: "2"
  GUNICORN_THREADS: "4"
  CELERY_CONCURRENCY: "4"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "20"

  # --- Performance & Caching ---
  AURORA_SETUP_CACHE_ENABLED: "true"
  AURORA_SETUP_CACHE_TTL: "3600"
  AURORA_CACHE_TOKEN_IN_REDIS: "false"
  RCA_OPTIMIZE_COSTS: "false"
  GEMINI_DISABLE_THINKING: "false"

  # --- Multi-agent RCA orchestrator (opt-in) ---
  # When "false" (default), background RCA uses the legacy single-agent path.
  # When "true", a lead orchestrator triages each RCA and may fan out parallel
  # read-only sub-agents. Set RCA_ORCHESTRATOR_MODEL and RCA_SUBAGENT_MODEL
  # when enabling.
  ORCHESTRATOR_ENABLED: "false"
  # Infrastructure visualization LLM extraction (disabled for cost; see cost-optimization design doc).
  VISUALIZATION_ENABLED: "false"
  # * Only when ORCHESTRATOR_ENABLED=true — triage + synthesis brain.
  RCA_ORCHESTRATOR_MODEL: ""
  # * Only when ORCHESTRATOR_ENABLED=true — sub-agent investigator model.
  RCA_SUBAGENT_MODEL: ""
  # Lightweight model for mechanical summarization (tool-output capping, alert/repo summaries). Empty = falls back to MAIN_MODEL.
  SUMMARIZATION_MODEL: ""

  # --- AWS Bedrock (non-secret config; credentials live in secrets.llm) ---
  # Gateway mode: set BEDROCK_BASE_URL to an OpenAI-compatible endpoint in front of
  # Bedrock. Native mode: leave it empty and set BEDROCK_REGION + AWS creds (or use
  # an IRSA role on the pods). Route models with LLM_PROVIDER_MODE=bedrock.
  BEDROCK_BASE_URL: ""   # gateway mode (OpenAI-compatible URL); empty = native AWS SDK
  BEDROCK_REGION: ""     # native mode AWS region; falls back to AWS_REGION
  BEDROCK_PROFILE: ""    # native mode named AWS profile (alternative to keys)

  # --- Security ---
  RATE_LIMITING_ENABLED: "false"
  RATE_LIMIT_HEADERS_ENABLED: "true"
  SPLUNK_SSL_VERIFY: "false" # "false" (default), "true", or path to a private CA bundle
  AURORA_VERIFY_CLI_IDENTITY: "false"
  
  # --- Optional Features (enable as needed) ---
  ENABLE_POD_ISOLATION: "false"               # Isolate terminal commands in separate pods
  # NEXT_PUBLIC_* feature flags — written to window.__ENV by docker-entrypoint.sh at startup, no image rebuild needed
  NEXT_PUBLIC_ENABLE_OVH: "false"            # OVH Cloud integration
  NEXT_PUBLIC_ENABLE_PAGERDUTY_OAUTH: "false" # PagerDuty integration
  NEXT_PUBLIC_ENABLE_SHAREPOINT: "false"     # SharePoint integration
  NEXT_PUBLIC_ENABLE_JIRA: "false"           # Jira integration
  NEXT_PUBLIC_ENABLE_NOTION: "false"         # Notion integration
  NEXT_PUBLIC_ENABLE_SPINNAKER: "false"      # Spinnaker integration
  NEXT_PUBLIC_ENABLE_VISUALIZATION: "false"  # Incident infra visualization UI (pairs with VISUALIZATION_ENABLED)
  
  # --- Pod Isolation Settings ---
  # When enabled, the chart automatically creates:
  #   - Terminal namespace (TERMINAL_NAMESPACE)
  #   - RBAC Role/RoleBindings for server and chatbot to manage terminal pods
  #   - NetworkPolicy blocking terminal pods from accessing cluster services
  #     (Vault, Weaviate, Postgres, Redis, etc.) while allowing external internet
  #   - K8s API tokens mounted on server/chatbot pods
  # Optional additional hardening (manual):
  #   - Create RuntimeClass for gVisor/Kata sandboxing (set TERMINAL_RUNTIME_CLASS)
  #   - Taint nodes for untrusted workloads (set USE_UNTRUSTED_NODES)
  TERMINAL_NAMESPACE: "untrusted"            # Namespace for isolated terminal pods
  TERMINAL_IMAGE: ""                         # Image for terminal pods (defaults to aurora-server)
  TERMINAL_POD_TTL: "3600"                   # Terminal pod lifetime in seconds
  TERMINAL_RUNTIME_CLASS: ""                 # RuntimeClass: "" (default), "gvisor", "kata"
  CHATBOT_POD_TTL: "600"                     # Chatbot session pod lifetime
  # Schedule terminal pods only on dedicated nodes (requires manual node setup):
  #   kubectl label node <node> workload=untrusted
  #   kubectl taint node <node> workload=untrusted:NoSchedule
  USE_UNTRUSTED_NODES: "false"
  
  # --- Kubectl Agent (optional, build-time) ---
  NEXT_PUBLIC_KUBECTL_AGENT_CHART_URL: ""    # Requires image rebuild to change
  
  # --- Development (optional) ---
  NGROK_URL: ""

# ------------------------------------------------------------------------------
# SSL/TLS Certificate Mounting
# ------------------------------------------------------------------------------
# Mount a Kubernetes Secret containing CA certificates into backend pods.
# Useful for RDS, ElastiCache, or other managed services requiring custom CA certs.
# Example:
#   kubectl create secret generic aurora-ca-cert --from-file=ca.crt=rds-combined-ca-bundle.pem
#   ssl.caCertSecret: "aurora-ca-cert"
#   config.POSTGRES_SSLROOTCERT: "/etc/ssl/aurora/ca.crt"
ssl:
  caCertSecret: ""                       # K8s Secret name containing CA cert (key: ca.crt)
  caCertMountPath: "/etc/ssl/aurora"     # Mount path inside pods

# ------------------------------------------------------------------------------
# Secrets (REQUIRED - must be set in values.generated.yaml)
# ------------------------------------------------------------------------------
secrets:
  # --- Database Credentials (secret-db.yaml) ---
  # Mounted by: server, celery-worker, celery-beat, chatbot, postgres
  db:
    # Use a pre-existing Kubernetes Secret instead of chart-managed secrets.
    # When set, the chart will not create secret-db and all pods will reference
    # this secret directly. It must contain keys: POSTGRES_USER, POSTGRES_PASSWORD
    # existingSecret: ""
    POSTGRES_USER: "aurora"
    POSTGRES_PASSWORD: ""        # REQUIRED - Generate with: openssl rand -base64 32
  
  # --- Backend Secrets (secret-backend.yaml) ---
  # Mounted by: server, celery-worker, celery-beat, chatbot
  backend:
    # Use a pre-existing Kubernetes Secret instead of chart-managed secrets.
    # When set, the chart will not create secret-backend and all pods will reference
    # this secret directly. It must contain VAULT_TOKEN (if using Vault), plus any
    # optional integration keys you use. STORAGE_ACCESS_KEY/STORAGE_SECRET_KEY are
    # optional when using IRSA or other pod-level credential injection.
    # existingSecret: ""
    VAULT_TOKEN: ""              # Required when SECRETS_BACKEND=vault. Not needed for aws_secrets_manager.
    STORAGE_ACCESS_KEY: ""       # S3 access key (optional when using IRSA/pod identity)
    STORAGE_SECRET_KEY: ""       # S3 secret key (optional when using IRSA/pod identity)

    # --- Optional: Slack Integration ---
    SLACK_CLIENT_ID: ""          # Get from: https://api.slack.com/apps
    SLACK_CLIENT_SECRET: ""
    SLACK_SIGNING_SECRET: ""

    # --- Optional: Google Chat Integration ---
    GOOGLE_CHAT_CLIENT_ID: ""              # OAuth client ID (for setup flow)
    GOOGLE_CHAT_CLIENT_SECRET: ""          # OAuth client secret (for setup flow)
    GOOGLE_CHAT_SERVICE_ACCOUNT_KEY: ""    # JSON key for the Chat app service account (for messaging)

    # --- GitHub App (default, recommended) ---
    GITHUB_AUTH_MODE: "app"                # app (default) | oauth | hybrid
    NEXT_PUBLIC_ENABLE_INCIDENT_PREVENTION: "true"  # false = disable PR change-gating entirely
    GITHUB_APP_ID: ""                      # Numeric App ID from App settings
    GITHUB_APP_CLIENT_ID: ""               # Starts with Iv23l...
    NEXT_PUBLIC_GITHUB_APP_SLUG: ""        # URL slug (e.g. aurora-acme-prod)
    GITHUB_APP_WEBHOOK_URL: ""             # https://<your-host>/github/webhook
    GITHUB_APP_SETUP_URL: ""               # https://<your-host>/github
    GITHUB_APP_WEBHOOK_SECRET: ""          # openssl rand -hex 32 (also stored in secrets backend)

    # --- GitHub OAuth (only when GITHUB_AUTH_MODE=oauth or hybrid) ---
    GH_OAUTH_CLIENT_ID: ""       # Get from: https://github.com/settings/developers
    GH_OAUTH_CLIENT_SECRET: ""

    # --- Optional: PagerDuty Integration ---
    PAGERDUTY_CLIENT_ID: ""
    PAGERDUTY_CLIENT_SECRET: ""

    # --- Optional: GCP OAuth (for GCP integrations) ---
    CLIENT_ID: ""                # GCP OAuth client ID
    CLIENT_SECRET: ""            # GCP OAuth client secret

    # --- Optional: OVH Cloud Integration ---
    OVH_EU_CLIENT_ID: ""         # Europe region
    OVH_EU_CLIENT_SECRET: ""
    OVH_CA_CLIENT_ID: ""         # Canada region
    OVH_CA_CLIENT_SECRET: ""
    OVH_US_CLIENT_ID: ""         # US region
    OVH_US_CLIENT_SECRET: ""

    # --- Optional: Atlassian Integration (Confluence + Jira) ---
    ATLASSIAN_CLIENT_ID: ""
    ATLASSIAN_CLIENT_SECRET: ""

    # --- Optional: SharePoint Integration ---
    SHAREPOINT_CLIENT_ID: ""
    SHAREPOINT_CLIENT_SECRET: ""
    SHAREPOINT_TENANT_ID: "common"

    # --- Optional: Bitbucket Integration ---
    BB_OAUTH_CLIENT_ID: ""
    BB_OAUTH_CLIENT_SECRET: ""

  # --- Application Secrets (secret-app.yaml) ---
  # Mounted by: server, celery-worker, celery-beat, chatbot, frontend, searxng
  app:
    # Use a pre-existing Kubernetes Secret instead of chart-managed secrets.
    # When set, the chart will not create secret-app and all pods will reference
    # this secret directly. It must contain keys: FLASK_SECRET_KEY, AUTH_SECRET,
    # SEARXNG_SECRET, plus any optional keys you use.
    # existingSecret: ""
    FLASK_SECRET_KEY: ""         # REQUIRED - Generate with: openssl rand -base64 32
    AUTH_SECRET: ""              # REQUIRED - Generate with: openssl rand -base64 32
    SEARXNG_SECRET: ""           # REQUIRED - Generate with: openssl rand -base64 32
    INTERNAL_API_SECRET: ""      # REQUIRED - Generate with: openssl rand -base64 32

    # --- Optional: AWS Connector ---
    # IAM identity for cross-account STS AssumeRole into user AWS accounts.
    # Not related to AWS_SM_* credentials used for the secrets backend.
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    
    # --- Optional: Email/SMTP ---
    SMTP_HOST: ""                # e.g., smtp.gmail.com
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASSWORD: ""
    SMTP_FROM_EMAIL: ""
    SMTP_FROM_NAME: "Aurora"
    
    # --- Optional: Rate Limiting Bypass ---
    RATE_LIMIT_BYPASS_TOKEN: ""  # Custom token to bypass rate limits

    # --- Optional: Memgraph Graph Database ---
    # Only needed if connecting to a Memgraph instance with auth enabled (e.g., Memgraph Cloud).
    # In-cluster Memgraph runs without auth by default (network-isolated via ClusterIP).
    MEMGRAPH_USER: ""
    MEMGRAPH_PASSWORD: ""

  # --- LLM API Keys (secret-llm.yaml) ---
  # Mounted by: chatbot, celery-worker, celery-beat
  llm:
    # Use a pre-existing Kubernetes Secret instead of chart-managed secrets.
    # When set, the chart will not create secret-llm and all pods will reference
    # this secret directly. It must contain at least one of: OPENROUTER_API_KEY,
    # OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLE_AI_API_KEY.
    # existingSecret: ""
    OPENROUTER_API_KEY: ""       # Get from: https://openrouter.ai/keys
    OPENAI_API_KEY: ""           # Get from: https://platform.openai.com/api-keys
    ANTHROPIC_API_KEY: ""        # Get from: https://console.anthropic.com/
    GOOGLE_AI_API_KEY: ""        # Get from: https://makersuite.google.com/app/apikey
    # AWS Bedrock — non-secret BEDROCK_BASE_URL/REGION/PROFILE live in config above.
    BEDROCK_API_KEY: ""              # gateway mode only (often unneeded — VPC handles auth)
    BEDROCK_ACCESS_KEY_ID: ""        # native mode; falls back to AWS_ACCESS_KEY_ID or an IRSA role
    BEDROCK_SECRET_ACCESS_KEY: ""    # native mode; falls back to AWS_SECRET_ACCESS_KEY
    BEDROCK_SESSION_TOKEN: ""        # native mode; only for temporary / STS credentials

# ------------------------------------------------------------------------------
# Security contexts
# ------------------------------------------------------------------------------
# ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
#
# Global pod-level security context — merged into every pod.
# Each service also has hardcoded UID/GID defaults (e.g. postgres=70, vault=100).
# The global values here are merged with those defaults, so you only need to set
# shared fields once (like seccompProfile) rather than repeating per-service.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Global container-level security context — merged into every container.
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# Per-service overrides (full replacement — provide all fields you need).
# Use when a specific service needs a completely different security posture.
# podSecurityContextOverrides:
#   postgres:
#     runAsNonRoot: true
#     runAsUser: 70
#     runAsGroup: 70
#     fsGroup: 70
#     seccompProfile:
#       type: Localhost
#       localhostProfile: profiles/custom.json
# containerSecurityContextOverrides:
#   vault:
#     allowPrivilegeEscalation: false
#     capabilities:
#       drop: ["ALL"]
#       add: ["IPC_LOCK"]

# ------------------------------------------------------------------------------
# Resource requests and limits
# ------------------------------------------------------------------------------
resources:
  server:
    requests:
      cpu: "200m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
      ephemeral-storage: "2Gi"
  mcp:
    requests:
      cpu: "100m"
      memory: "256Mi"
      ephemeral-storage: "100Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
      ephemeral-storage: "500Mi"
  celeryWorker:
    requests:
      cpu: "100m"
      memory: "1Gi"
      ephemeral-storage: "1Gi"
    limits:
      cpu: "1000m"
      memory: "4Gi"
      ephemeral-storage: "2Gi"
  celeryBeat:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  chatbot:
    requests:
      cpu: "100m"
      memory: "256Mi"
      ephemeral-storage: "100Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
      ephemeral-storage: "1Gi"
  frontend:
    requests:
      cpu: "50m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
  redis:
    requests:
      cpu: "50m"
      memory: "128Mi"
      ephemeral-storage: "50Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
      ephemeral-storage: "1Gi"
  searxng:
    requests:
      cpu: "50m"
      memory: "128Mi"
      ephemeral-storage: "50Mi"
    limits:
      cpu: "300m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
  weaviate:
    requests:
      cpu: "100m"
      memory: "512Mi"
      ephemeral-storage: "100Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
      ephemeral-storage: "1Gi"
  memgraph:
    requests:
      cpu: "100m"
      memory: "512Mi"
